name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Workflow runner (Python + manifest)
        run: |
          set -e
          mkdir -p /tmp/bgw/{Ransomware_live_event_victim,CVE_Project_NVD,IOCs-crawler-main}
          touch /tmp/bgw/Ransomware_live_event_victim/main.py
          touch /tmp/bgw/CVE_Project_NVD/main.py
          touch /tmp/bgw/IOCs-crawler-main/main.py
          python3 scripts/workflow_runner.py --workspace /tmp/bgw --workflow ransomware --dry-run
          python3 scripts/workflow_runner.py --workspace /tmp/bgw --workflow cve --dry-run
          python3 scripts/workflow_runner.py --workspace /tmp/bgw --workflow iocs_crawler --dry-run
      - name: CTI vault bootstrap (Python)
        run: |
          set -e
          cd cti_vault_bootstrap
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -e . -q
          python -m unittest discover -s tests -v
      - run: npm run build

  tauri:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            desktop-file-utils \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev
      - run: npm ci
      - name: Build Tauri app
        run: npm run tauri build
      - name: Upload Windows installer (NSIS)
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: bacongris-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
      - name: Upload macOS bundle
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: bacongris-macos-bundle
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
      - name: Upload Linux packages
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: bacongris-linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
