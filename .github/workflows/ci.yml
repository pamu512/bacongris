name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Workflow runner (Python + manifest)
        run: |
          set -e
          mkdir -p /tmp/bgw/{Ransomware_live_event_victim,CVE_Project_NVD,IOCs-crawler-main}
          touch /tmp/bgw/Ransomware_live_event_victim/main.py
          touch /tmp/bgw/CVE_Project_NVD/main.py
          touch /tmp/bgw/IOCs-crawler-main/main.py
          python3 scripts/workflow_runner.py --workspace /tmp/bgw --workflow ransomware --dry-run
          python3 scripts/workflow_runner.py --workspace /tmp/bgw --workflow cve --dry-run
          python3 scripts/workflow_runner.py --workspace /tmp/bgw --workflow iocs_crawler --dry-run
      - name: CTI vault (Python)
        run: |
          set -e
          python3 -m venv .venv-cti
          . .venv-cti/bin/activate
          pip install -e . -q
          python -m unittest discover -s tests -v
          mkdir -p CVE_Project_NVD/NVD_CVE
          python3 - <<'PY'
          import gzip, json, pathlib
          p = pathlib.Path("CVE_Project_NVD/NVD_CVE/nvdcve-2.0-ci.json.gz")
          doc = {
            "vulnerabilities": [{
              "cve": {
                "id": "CVE-2099-00001",
                "published": "2099-01-01T00:00:00.000",
                "lastModified": "2099-01-01T00:00:00.000",
                "descriptions": [{"lang": "en", "value": "ci smoke"}],
              }
            }]
          }
          with gzip.open(p, "wt", encoding="utf-8") as f:
              json.dump(doc, f)
          PY
          (cd CVE_Project_NVD && python3 main.py --skip-download)
          test -s CVE_Project_NVD/csv_output/nvd_from_vault.csv
          grep -q CVE-2099-00001 CVE_Project_NVD/csv_output/nvd_from_vault.csv
          python3 ASM-fetch-main/scan_vault.py
          grep -q example.com ASM-fetch-main/csv_output/asm_from_vault.csv
          python3 - <<'PY'
          from pathlib import Path
          import sys
          sys.path.insert(0, str(Path("IOCs-crawler-main").resolve()))
          import ioc_celery_vault as m
          assert m.ioc_persist_from_task("10.0.0.2", "ipv4", {"t": "ci"}, workspace_root=Path(".").resolve())
          PY
      - run: npm run build

  tauri:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            desktop-file-utils \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev
      - run: npm ci
      - name: Build Tauri app
        run: npm run tauri build
      - name: Upload Windows installer (NSIS)
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: bacongris-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
      - name: Upload macOS bundle
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: bacongris-macos-bundle
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
      - name: Upload Linux packages
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: bacongris-linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
