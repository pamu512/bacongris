# Merge into `docker-compose.yml` so the container shares `cti_vault.db` with the host.
# Mount the **workspace / monorepo root** (parent of ASM-fetch-main), not only this folder.
# On Linux: `export UID GID` before `docker compose` (or use numeric ids) so files on the bind mount match the host user.

services:
  asm-fetch:
    # image: your-asm-image
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - "../:/workspace:rw"
    environment:
      CTI_VAULT_PATH: "/workspace/cti_vault.db"
    working_dir: /workspace/ASM-fetch-main
